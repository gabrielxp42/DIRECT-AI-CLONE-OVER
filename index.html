<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA Meta Tags -->
  <meta name="application-name" content="DIRECT AI" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Direct AI" />
  <meta name="description" content="Gestão e Otimização Inteligente para Impressão DTF - iadirect.com.br" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#020817" />

  <!-- ANTI-BOT & PRIVACY SHIELD -->
  <meta name="robots" content="noindex, nofollow, noai, noimageai" />
  <meta name="googlebot" content="noindex, nofollow, noarchive" />
  <meta name="GPTBot" content="noindex, nofollow" />
  <meta name="Google-Extended" content="noindex, nofollow" />
  <meta name="CCBot" content="noindex" />
  <meta name="FacebookBot" content="noindex" />
  <meta name="anthropic-ai" content="none" />
  <meta name="cohere-ai" content="none" />
  <meta name="omg-ai" content="none" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="114x114" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="76x76" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="72x72" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="60x60" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="57x57" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <title>Direct AI - Gestão e Otimização de DTF</title>

  <!-- Anti-Clone Scripts (Bloqueio Básico de Inspeção) -->
  <script>
    // Bloquear Botão Direito (Menu de Contexto)
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Dificultar Atalhos de DevTools
    document.onkeydown = function (e) {
      if (e.keyCode == 123) { // F12
        return false;
      }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
        return false;
      }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C
        return false;
      }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
        return false;
      }
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U (View Source)
        return false;
      }
    };
  </script>

  <!-- Suprimir erros de extensões do Chrome (AdBlock, etc) -->
  <script>
    window.addEventListener('error', function (e) {
      // Ignorar erros de AbortError e erros de scripts de terceiros/extensões
      if (e.message && (
        e.message.includes('message channel closed') ||
        e.message.includes('asynchronous response') ||
        e.message.includes('AbortError') ||
        e.message.includes('signal is aborted') ||
        e.message.includes('webpage_content_reporter') // Ignorar erro específico relatado
      )) {
        console.warn('⚠️ Erro suprimido (segurança/extensão):', e.message);
        e.preventDefault();
        e.stopPropagation();
        return false;
      }

      // Se for SyntaxError em arquivo externo, tentar não quebrar o resto
      if (e.error instanceof SyntaxError && e.filename && e.filename.includes('webpage_content_reporter')) {
        console.warn('⚠️ SyntaxError suprimido em script externo:', e.message);
        e.preventDefault();
        return false;
      }
    }, true);

    window.addEventListener('unhandledrejection', function (e) {
      if (e.reason && (
        (e.reason.message && (
          e.reason.message.includes('message channel closed') ||
          e.reason.message.includes('asynchronous response') ||
          e.reason.message.includes('AbortError') ||
          e.reason.message.includes('signal is aborted')
        )) ||
        (e.reason.name === 'AbortError') // Catch AbortError objects directly
      )) {
        // console.warn('⚠️ Promessa rejeitada suprimida:', e.reason);
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
    }, true);

    // Corrigir erro de deployment (Failed to fetch dynamically imported module)
    window.addEventListener('vite:preloadError', (event) => {
      console.error('CRITICAL: Erro de carregamento de módulo pós-atualização. Recarregando...', event);
      window.location.reload();
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
