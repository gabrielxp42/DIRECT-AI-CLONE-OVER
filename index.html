  <!-- Anti-Clone Scripts (Bloqueio Básico de Inspeção) -->
  <script>
    // Bloquear Botão Direito (Menu de Contexto)
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Dificultar Atalhos de DevTools
    document.onkeydown = function (e) {
      if (e.keyCode == 123) { // F12
        return false;
      }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
        return false;
      }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C
        return false;
      }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
        return false;
      }
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U (View Source)
        return false;
      }
    };
  </script>

<!-- Suprimir erros de extensões do Chrome (AdBlock, etc) -->
<script>
  // Executar ANTES de qualquer outro código
  window.addEventListener('error', function (e) {
    if (e.message && (
      e.message.includes('message channel closed') ||
      e.message.includes('asynchronous response')
    )) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);

  window.addEventListener('unhandledrejection', function (e) {
    if (e.reason && e.reason.message && (
      e.reason.message.includes('message channel closed') ||
      e.reason.message.includes('asynchronous response')
    )) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);
</script>
